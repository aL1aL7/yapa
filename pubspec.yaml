name: yapa
description: "Yet Another Paperless-ngx App - Mobile client for paperless-ngx"
publish_to: 'none'
version: 1.4.3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.2
  syncfusion_flutter_pdfviewer: ^33.1.49
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  package_info_plus: ^8.3.0
  image_picker: ^1.1.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/app_icon.png
